<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票損益計算機 Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --bg:#f5f6fa; --card:#fff; --text:#222; --input:#fff;
}
.dark {
  --bg:#1e1e1e; --card:#2b2b2b; --text:#eee; --input:#3a3a3a;
}

body { margin:0; font-family:Arial; background:var(--bg); color:var(--text); }

.container { max-width:900px; margin:auto; padding:15px; }

.card {
  background:var(--card);
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

input, select {
  width:100%; padding:12px; margin:6px 0;
  background:var(--input); color:var(--text);
  border:1px solid #ccc; border-radius:6px;
}

button {
  padding:12px; width:100%;
  background:#2f80ed; color:#fff;
  border:none; border-radius:6px;
}

.highlight { background:yellow; color:black; }

.profit { color:red; }
.loss { color:#00c853; }

.big {
  font-size:20px;
  font-weight:bold;
  margin-top:10px;
}

.table-wrap { overflow-x:auto; }

table {
  width:100%;
  border-collapse:collapse;
}

td,th {
  border:1px solid #aaa;
  padding:8px;
  text-align:center;
}

.toggle-btn {
  background:#444;
  margin-bottom:10px;
}

canvas { margin-top:10px; }
</style>
</head>

<body>

<div class="container">

<div class="card">

<button class="toggle-btn" onclick="toggleTheme()">🌙 深色 / 淺色</button>

<h2>📊 股票損益計算機 Pro</h2>

<input id="buy" placeholder="買入價格">
<input id="qty" placeholder="股數">
<input id="discount" placeholder="手續費折數 (0.28)">
<select id="type">
<option value="stock">現股 (0.3%)</option>
<option value="etf">ETF (0.1%)</option>
<option value="day">當沖 (0.15%)</option>
</select>

<input id="range" placeholder="顯示筆數 (20)">

<div class="big" id="breakeven"></div>

</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card table-wrap">
<table>
<thead>
<tr>
<th>賣出價</th>
<th>損益</th>
<th>報酬率</th>
</tr>
</thead>
<tbody id="result"></tbody>
</table>
</div>

</div>

<script>
let chart;

function toggleTheme(){
  document.body.classList.toggle("dark");
  localStorage.setItem("theme",
    document.body.classList.contains("dark")?"dark":"light");
}
if(localStorage.getItem("theme")==="dark"){
  document.body.classList.add("dark");
}

function getTax(t){
  if(t==="etf") return 0.001;
  if(t==="day") return 0.0015;
  return 0.003;
}

// 🔥 即時計算
document.querySelectorAll("input,select").forEach(el=>{
  el.addEventListener("input", calculate);
});

function calculate(){

  let buy=+buyInput.value||0;
  let qty=+qtyInput.value||0;
  let discount=+discountInput.value||0;
  let type=typeSelect.value;
  let range=+rangeInput.value||20;

  let fee=0.001425*discount;
  let tax=getTax(type);

  let tbody=result;
  tbody.innerHTML="";

  let labels=[];
  let profits=[];

  let breakeven=null;

  for(let i=-range;i<=range;i++){
    let sell=buy+i;

    let buyCost=buy*qty*(1+fee);
    let sellIncome=sell*qty*(1-fee-tax);

    let p=sellIncome-buyCost;
    let roi=p/buyCost*100;

    labels.push(sell.toFixed(1));
    profits.push(p);

    let tr=document.createElement("tr");

    if(breakeven===null && p>=0){
      tr.classList.add("highlight");
      breakeven=sell;
    }

    tr.innerHTML=`
    <td>${sell.toFixed(1)}</td>
    <td class="${p>=0?'profit':'loss'}">${p.toFixed(0)}</td>
    <td class="${p>=0?'profit':'loss'}">${roi.toFixed(2)}%</td>
    `;

    tbody.appendChild(tr);
  }

  // 🎯 不虧價
  breakevenDiv.innerText = breakeven
    ? "🎯 不虧價：" + breakeven.toFixed(2)
    : "⚠ 無法打平";

  // 📈 畫圖
  if(chart) chart.destroy();
  chart = new Chart(chartCanvas, {
    type:'line',
    data:{
      labels:labels,
      datasets:[{
        label:'損益',
        data:profits,
        tension:0.3
      }]
    }
  });

  // 💾 記住
  localStorage.setItem("data", JSON.stringify({
    buy,qty,discount,type,range
  }));
}

// DOM 快取
let buyInput=document.getElementById("buy");
let qtyInput=document.getElementById("qty");
let discountInput=document.getElementById("discount");
let typeSelect=document.getElementById("type");
let rangeInput=document.getElementById("range");
let result=document.getElementById("result");
let breakevenDiv=document.getElementById("breakeven");
let chartCanvas=document.getElementById("chart");

// 載入資料
let saved=JSON.parse(localStorage.getItem("data")||"{}");
buyInput.value=saved.buy||1000;
qtyInput.value=saved.qty||1000;
discountInput.value=saved.discount||0.28;
typeSelect.value=saved.type||"stock";
rangeInput.value=saved.range||20;

calculate();
</script>

</body>
</html>
