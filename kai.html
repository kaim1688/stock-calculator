<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票損益計算機（券商精準版）</title>

<style>
:root {
  --bg:#f5f6fa; --card:#fff; --text:#222; --input:#fff;
}
.dark {
  --bg:#1e1e1e; --card:#2b2b2b; --text:#eee; --input:#3a3a3a;
}

body { margin:0; font-family:Arial; background:var(--bg); color:var(--text); }

.container { max-width:900px; margin:auto; padding:15px; }

.card {
  background:var(--card);
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

label {
  font-size:14px;
  margin-top:10px;
  display:block;
}

input, select {
  width:100%; padding:12px; margin:4px 0 8px 0;
  background:var(--input); color:var(--text);
  border:1px solid #ccc; border-radius:6px;
}

.highlight { background:yellow; color:black; }
.profit { color:red; }
.loss { color:#00c853; }

.big {
  font-size:20px;
  font-weight:bold;
  margin-top:10px;
}

.table-wrap { overflow-x:auto; }

table {
  width:100%;
  border-collapse:collapse;
}

td,th {
  border:1px solid #aaa;
  padding:8px;
  text-align:center;
}

.toggle-btn {
  background:#444;
  margin-bottom:10px;
  padding:10px;
  width:100%;
  color:white;
  border:none;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<button class="toggle-btn" onclick="toggleTheme()">🌙 深色 / 淺色</button>

<h2>📊 股票損益計算機（券商精準版）</h2>

<label>買入價格</label>
<input id="buy" type="number">

<label>股數</label>
<input id="qty" type="number">

<label>手續費折數</label>
<input id="discount" type="number" step="0.01">

<label>交易類型</label>
<select id="type">
<option value="stock">現股 (0.3%)</option>
<option value="etf">ETF (0.1%)</option>
<option value="day">當沖 (0.15%)</option>
</select>

<label>顯示筆數</label>
<input id="range" type="number">

<div class="big" id="breakeven"></div>
<div id="detail"></div>

</div>

<div class="card table-wrap">
<table>
<thead>
<tr>
<th>賣出價</th>
<th>損益</th>
<th>報酬率</th>
</tr>
</thead>
<tbody id="result"></tbody>
</table>
</div>

</div>

<script>

// 🌙 主題
function toggleTheme(){
  document.body.classList.toggle("dark");
  localStorage.setItem("theme",
    document.body.classList.contains("dark")?"dark":"light");
}
if(localStorage.getItem("theme")==="dark"){
  document.body.classList.add("dark");
}

// 稅率
function getTax(type){
  if(type==="etf") return 0.001;
  if(type==="day") return 0.0015;
  return 0.003;
}

// 🔥 券商精準計算
function calcReal(buy, sell, qty, feeRate, taxRate){

  let feeBuy = Math.round(buy * qty * feeRate);
  if(feeBuy < 20) feeBuy = 20;

  let feeSell = Math.round(sell * qty * feeRate);
  if(feeSell < 20) feeSell = 20;

  let tax = Math.round(sell * qty * taxRate);

  let buyCost = buy * qty + feeBuy;
  let sellIncome = sell * qty - feeSell - tax;

  let profit = sellIncome - buyCost;
  let roi = profit / buyCost * 100;

  return {profit, roi, feeBuy, feeSell, tax};
}

// 即時計算
document.querySelectorAll("input,select").forEach(el=>{
  el.addEventListener("input", calculate);
});

function calculate(){

  let buy=+buyInput.value||0;
  let qty=+qtyInput.value||0;
  let discount=+discountInput.value||0;
  let type=typeSelect.value;
  let range=+rangeInput.value||20;

  let feeRate = 0.001425 * discount;
  let taxRate = getTax(type);

  result.innerHTML="";

  let breakeven=null;

  for(let i=-range;i<=range;i++){

    let sell = buy + i;

    let r = calcReal(buy, sell, qty, feeRate, taxRate);

    let tr=document.createElement("tr");

    if(breakeven===null && r.profit>=0){
      tr.classList.add("highlight");
      breakeven=sell;
    }

    tr.innerHTML=`
      <td>${sell.toFixed(1)}</td>
      <td class="${r.profit>=0?'profit':'loss'}">${r.profit}</td>
      <td class="${r.profit>=0?'profit':'loss'}">${r.roi.toFixed(2)}%</td>
    `;

    result.appendChild(tr);
  }

  breakevenDiv.innerText = breakeven
    ? "🎯 不虧價：" + breakeven.toFixed(2)
    : "⚠ 無法打平";

  let detail = calcReal(buy, buy, qty, feeRate, taxRate);

  detailDiv.innerHTML = `
    💰 買手續費：${detail.feeBuy} 元　
    賣手續費：${detail.feeSell} 元　
    交易稅：${detail.tax} 元
  `;

  localStorage.setItem("data", JSON.stringify({
    buy,qty,discount,type,range
  }));
}

// DOM
let buyInput=document.getElementById("buy");
let qtyInput=document.getElementById("qty");
let discountInput=document.getElementById("discount");
let typeSelect=document.getElementById("type");
let rangeInput=document.getElementById("range");
let result=document.getElementById("result");
let breakevenDiv=document.getElementById("breakeven");
let detailDiv=document.getElementById("detail");

// 載入
let saved=JSON.parse(localStorage.getItem("data")||"{}");
buyInput.value=saved.buy ?? 1000;
qtyInput.value=saved.qty ?? 1000;
discountInput.value=saved.discount ?? 0.28;
typeSelect.value=saved.type ?? "stock";
rangeInput.value=saved.range ?? 20;

calculate();
</script>

</body>
</html>
