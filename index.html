<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>股票損益計算機</title>

<style>
:root {
  --bg: #f5f6fa;
  --card: white;
  --text: #222;
  --input: #fff;
}

.dark {
  --bg: #1e1e1e;
  --card: #2b2b2b;
  --text: #eee;
  --input: #3a3a3a;
}

body {
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: var(--card);
  padding: 20px;
  border-radius: 10px;
}

input, select {
  padding: 8px;
  margin: 5px 0;
  width: 100%;
  background: var(--input);
  color: var(--text);
  border: 1px solid #ccc;
}

button {
  padding: 10px;
  background: #2f80ed;
  color: white;
  border: none;
  cursor: pointer;
  width: 100%;
  margin-top: 10px;
}

.toggle-btn {
  margin-bottom: 10px;
  background: #444;
}

table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

td, th {
  border: 1px solid #aaa;
  padding: 8px;
  text-align: center;
}

.profit { color: red; }
.loss { color: #00c853; }

.highlight {
  background: yellow;
  color: black;
}
</style>
</head>

<body>

<div class="container">

<button class="toggle-btn" onclick="toggleTheme()">🌙 切換深色 / 淺色</button>

<h2>📊 股票損益計算機</h2>

<label>買入價格</label>
<input id="buy" value="1000">

<label>股數</label>
<input id="qty" value="1000">

<label>手續費折數</label>
<input id="discount" value="0.28">

<label>交易類型</label>
<select id="type">
  <option value="stock">現股 (0.3%)</option>
  <option value="etf">ETF (0.1%)</option>
  <option value="day">當沖 (0.15%)</option>
</select>

<label>顯示筆數（例如 20）</label>
<input id="range" value="20">

<button onclick="calculate()">計算</button>

<table>
<thead>
<tr>
<th>賣出價</th>
<th>損益</th>
<th>報酬率</th>
</tr>
</thead>
<tbody id="result"></tbody>
</table>

</div>

<script>

// 🌙 主題切換
function toggleTheme() {
  document.body.classList.toggle("dark");
  localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
}

// 讀取主題
if (localStorage.getItem("theme") === "dark") {
  document.body.classList.add("dark");
}

// 稅率
function getTax(type) {
  if (type === "etf") return 0.001;
  if (type === "day") return 0.0015;
  return 0.003;
}

function calculate() {
  let buy = parseFloat(document.getElementById("buy").value);
  let qty = parseInt(document.getElementById("qty").value);
  let discount = parseFloat(document.getElementById("discount").value);
  let type = document.getElementById("type").value;
  let range = parseInt(document.getElementById("range").value);

  let fee = 0.001425 * discount;
  let tax = getTax(type);

  let tbody = document.getElementById("result");
  tbody.innerHTML = "";

  let found = false;

  for (let i = -range; i <= range; i++) {
    let sell = buy + i;

    let buyCost = buy * qty * (1 + fee);
    let sellIncome = sell * qty * (1 - fee - tax);

    let profit = sellIncome - buyCost;
    let roi = (profit / buyCost) * 100;

    let tr = document.createElement("tr");

    if (!found && profit >= 0) {
      tr.classList.add("highlight");
      found = true;
    }

    tr.innerHTML = `
      <td>${sell.toFixed(1)}</td>
      <td class="${profit >= 0 ? 'profit' : 'loss'}">${profit.toFixed(0)} 元</td>
      <td class="${profit >= 0 ? 'profit' : 'loss'}">${roi.toFixed(2)}%</td>
    `;

    tbody.appendChild(tr);
  }
}

</script>

</body>
</html>
