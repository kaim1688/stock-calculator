<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票損益計算機 Pro+</title>

<style>
:root{
  --bg:#0f172a;
  --card:rgba(255,255,255,0.08);
  --text:#e5e7eb;
  --accent:#38bdf8;
}

.light{
  --bg:#f1f5f9;
  --card:rgba(255,255,255,0.9);
  --text:#111;
}

/* 🌌 背景 */
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
  background-size:400% 400%;
  animation:bgMove 12s ease infinite;
  color:var(--text);
}

@keyframes bgMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.container{
  max-width:900px;
  margin:auto;
  padding:15px;
}

/* 🧊 卡片 */
.card{
  background:var(--card);
  backdrop-filter: blur(12px);
  border-radius:16px;
  padding:16px;
  margin-bottom:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* 輸入 */
input,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:var(--text);
}

/* 按鈕 */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#38bdf8,#6366f1);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.toggle{
  background:#334155;
  margin-bottom:10px;
}

/* 表格 */
.table-wrap{overflow:auto;}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* 顏色 */
.profit{color:#ff4d4f;}
.loss{color:#22c55e;}

.highlight{
  background:rgba(255,255,0,0.2);
}

/* 不虧價 */
.breakeven{
  font-size:18px;
  font-weight:bold;
  margin-top:10px;
  color:#facc15;
}

/* 手機優化 */
@media(max-width:600px){
  th,td{font-size:12px;padding:6px;}
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<button class="toggle" onclick="toggleTheme()">🌙 主題切換</button>

<h2>📊 股票損益計算機 Pro+</h2>

<input id="buy" placeholder="買入價格">
<input id="qty" placeholder="股數">
<input id="discount" placeholder="手續費折數 (0.28)">
<select id="type">
<option value="stock">現股 (0.3%)</option>
<option value="etf">ETF (0.1%)</option>
<option value="day">當沖 (0.15%)</option>
</select>
<input id="range" placeholder="顯示筆數 (20)">

<div class="breakeven" id="breakeven"></div>

</div>

<div class="card table-wrap">
<table>
<thead>
<tr>
<th>賣出價</th>
<th>損益</th>
<th>報酬率</th>
</tr>
</thead>
<tbody id="result"></tbody>
</table>
</div>

</div>

<script>
// 🌙 主題
function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem("theme",
    document.body.classList.contains("light")?"light":"dark");
}
if(localStorage.getItem("theme")==="light"){
  document.body.classList.add("light");
}

// 稅
function getTax(t){
  if(t==="etf") return 0.001;
  if(t==="day") return 0.0015;
  return 0.003;
}

// 即時計算
document.querySelectorAll("input,select").forEach(el=>{
  el.addEventListener("input", calculate);
});

function calculate(){
  let buy=+buyInput.value||0;
  let qty=+qtyInput.value||0;
  let discount=+discountInput.value||0;
  let type=typeSelect.value;
  let range=+rangeInput.value||20;

  let fee=0.001425*discount;
  let tax=getTax(type);

  result.innerHTML="";
  let breakeven=null;

  for(let i=-range;i<=range;i++){
    let sell=buy+i;

    let cost=buy*qty*(1+fee);
    let income=sell*qty*(1-fee-tax);

    let p=income-cost;
    let roi=p/cost*100;

    let tr=document.createElement("tr");

    if(breakeven===null && p>=0){
      tr.classList.add("highlight");
      breakeven=sell;
    }

    tr.innerHTML=`
      <td>${sell.toFixed(1)}</td>
      <td class="${p>=0?'profit':'loss'}">${p.toFixed(0)}</td>
      <td class="${p>=0?'profit':'loss'}">${roi.toFixed(2)}%</td>
    `;

    result.appendChild(tr);
  }

  breakevenDiv.innerText = breakeven
    ? "🎯 不虧價：" + breakeven.toFixed(2)
    : "⚠ 無法打平";

  // 儲存
  localStorage.setItem("data", JSON.stringify({
    buy,qty,discount,type,range
  }));
}

// DOM
let buyInput=document.getElementById("buy");
let qtyInput=document.getElementById("qty");
let discountInput=document.getElementById("discount");
let typeSelect=document.getElementById("type");
let rangeInput=document.getElementById("range");
let result=document.getElementById("result");
let breakevenDiv=document.getElementById("breakeven");

// 載入
let saved=JSON.parse(localStorage.getItem("data")||"{}");
buyInput.value=saved.buy||1000;
qtyInput.value=saved.qty||1000;
discountInput.value=saved.discount||0.28;
typeSelect.value=saved.type||"stock";
rangeInput.value=saved.range||20;

calculate();
</script>

</body>
</html>
